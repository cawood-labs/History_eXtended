# Academic Blacksmith benchmark — do not merge to master as the default CI.
# Dispatch from Actions UI or:
#   gh workflow run ci-benchmark.yml --repo cawood-labs/History_eXtended \
#     --ref experiment/blacksmith-benchmark -f runner=blacksmith-2vcpu-ubuntu-2404
name: CI Benchmark

on:
  workflow_dispatch:
    inputs:
      runner:
        description: Runner label to benchmark
        required: true
        type: choice
        default: blacksmith-2vcpu-ubuntu-2404
        options:
          - ubuntu-latest
          - blacksmith-2vcpu-ubuntu-2404
          - blacksmith-8vcpu-ubuntu-2404

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Start MinIO
        run: |
          # Forgejo act_runner uses remote DinD: -p binds on the daemon bridge, not job localhost.
          if [[ "${DOCKER_HOST:-}" == tcp://* ]]; then
            JOB_NET=$(docker inspect -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' "$(hostname)")
            docker run -d --name minio --network "$JOB_NET" \
              -e MINIO_ROOT_USER=minioadmin \
              -e MINIO_ROOT_PASSWORD=minioadmin \
              minio/minio:RELEASE.2025-09-07T16-13-09Z \
              server /data --console-address ":9001"
            MINIO_HOST=minio
          else
            docker run -d --name minio \
              -p 9000:9000 -p 9001:9001 \
              -e MINIO_ROOT_USER=minioadmin \
              -e MINIO_ROOT_PASSWORD=minioadmin \
              minio/minio:RELEASE.2025-09-07T16-13-09Z \
              server /data --console-address ":9001"
            MINIO_HOST=127.0.0.1
          fi

          MINIO_ENDPOINT="http://${MINIO_HOST}:9000"
          echo "HX_S3_ENDPOINT=${MINIO_ENDPOINT}" >> "${GITHUB_ENV}"
          echo "MinIO endpoint: ${MINIO_ENDPOINT}"

          for i in {1..120}; do
            if curl -fsS "${MINIO_ENDPOINT}/minio/health/live" >/dev/null; then
              echo "MinIO is up"
              exit 0
            fi
            sleep 1
          done

          docker logs minio
          exit 1

      - name: Create MinIO buckets
        run: |
          curl -sfLo /tmp/mc https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x /tmp/mc
          /tmp/mc alias set local "${HX_S3_ENDPOINT}" minioadmin minioadmin
          /tmp/mc mb local/test-bucket --ignore-existing
          /tmp/mc mb local/hx-test --ignore-existing

      - name: Build
        run: go build -tags sqlite_fts5 -o /dev/null ./cmd/hx ./cmd/hxd ./cmd/hx-emit

      - name: Unit Tests
        run: go test -tags sqlite_fts5 -v ./...

      - name: Phase 2A Integration Tests
        run: |
          go test ./testdata/integration/... -race -v

      - name: Phase 2B S3 Integration Tests
        env:
          HX_REQUIRE_S3_ENDPOINT: "1"
          HX_S3_ENDPOINT: ${{ env.HX_S3_ENDPOINT }}
          HX_S3_ACCESS_KEY: "minioadmin"
          HX_S3_SECRET_KEY: "minioadmin"
        run: |
          go test ./internal/sync/... -v -race \
            -run "TestS3Store_MinIOIntegration|TestTwoNodeConverge_MinIO|TestTombstonePropagation_MinIO|TestCorruptManifest_MinIO|TestEfficiency_ManifestReducesListCalls|TestRetryableStore_MinIOIntegration"

      - name: Security Validation Tests
        run: |
          go test ./internal/sync/... -v -race \
            -run "TestValidate|TestSecure|TestSanitize|TestResource|TestPathTraversalPrevention"

      - name: Test Coverage
        run: |
          go test -tags sqlite_fts5 -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload Coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [[ -z "${CODECOV_TOKEN:-}" ]]; then
            echo "CODECOV_TOKEN not set; skipping Codecov upload"
            exit 0
          fi
          curl -sfLo codecov https://uploader.codecov.io/latest/linux/codecov
          chmod +x codecov
          ./codecov -t "${CODECOV_TOKEN}" -f ./coverage.out -F unittests

      - name: Validate (A1-A7 golden dataset)
        run: |
          make build
          chmod +x scripts/validate.sh
          ./scripts/validate.sh

      - name: Cleanup MinIO
        if: always()
        run: |
          docker stop minio || true
          docker rm minio || true

  lint:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m --build-tags=sqlite_fts5
